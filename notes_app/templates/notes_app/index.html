<!DOCTYPE html>
<html>
<head>
    <title>My Sticky Notes</title>
</head>
<body>
    <h1>My Sticky Notes</h1>
    <hr>
    {% for note in notes %}
        <div>
            <h3>{{ note.title }}</h3>
            <p>{{ note.content }}</p>
            <small>Posted on: {{ note.created_at }}</small>
        </div>
        <hr>
    {% empty %}
        <p>No notes yet!</p>
    {% endfor %}
</body>
</html>
