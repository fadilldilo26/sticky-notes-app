<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sticky Notes</title>
    <style>
        .note-container {
            border: 1px solid #ccc;
            background-color: #fff9c4; /* Sticky note yellow */
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .delete-btn {
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
        }
        .edit-btn {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .add-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #28a745; /* Green for "Add" */
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>My Sticky Notes</h1>
    <hr>

    <a href="{% url 'add_note' %}" class="add-link">+ Add a New Note</a>

    <div id="notes-list">
        {% for note in notes %}
            <div class="note-container">
                <h3>{{ note.title }}</h3>
                <p>{{ note.content }}</p>
                <small>Created: {{ note.created_at|date:"M d, Y H:i" }}</small>
                <br><br>
                
                <a href="{% url 'edit_note' note.id %}" class="edit-btn">Edit Note</a> | 
                <a href="{% url 'delete_note' note.id %}" class="delete-btn">Delete Note</a>
            </div>
        {% empty %}
            <p>No notes found. Start by adding one above!</p>
        {% endfor %}
    </div>

</body>
</html>
