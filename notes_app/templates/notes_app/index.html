<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>My Sticky Notes</title>
</head>
<body class="container mt-5 bg-light">
    <h1 class="mb-4 text-center">My Sticky Notes</h1>
    
    <div class="card mb-5 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Add a New Note</h5>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="title" class="form-control" placeholder="Title" required>
                </div>
                <div class="mb-3">
                    <textarea name="content" class="form-control" placeholder="Write something..." rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Note</button>
            </form>
        </div>
    </div>

    <div class="row">
        {% for note in notes %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ note.title }}</h5>
                        <p class="card-text">{{ note.content }}</p>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-between">
                        <small class="text-muted">{{ note.created_at|date:"d M Y" }}</small>
                        <div>
                            <a href="{% url 'note_edit' note.id %}" class="btn btn-sm btn-outline-warning">Edit</a>
                            <form action="{% url 'delete_note' note.id %}" method="POST" style="display:inline;">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-12 text-center">
                <p class="text-muted">No notes found. Start by adding one above!</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
