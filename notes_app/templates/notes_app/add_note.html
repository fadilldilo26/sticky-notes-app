<!DOCTYPE html>
<html>
<head>
    <title>Add a New Note</title>
</head>
<body>
    <h1>Add a New Note</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Note</button>
    </form>
    <br>
    <a href="{% url 'note_list' %}">Back to all notes</a>
</body>
</html>
